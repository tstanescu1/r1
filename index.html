<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=287, initial-scale=1.0">
    <style>
        /* Updated height to 287px */
        body, html { 
            width: 240px; height: 287px; 
            margin: 0; padding: 0; 
            background: #000; color: #fff; font-family: sans-serif; 
            overflow: hidden; box-sizing: border-box; 
        }
        #app { 
            width: 240px; height: 287px; 
            border: 5px solid #FE5000; 
            box-sizing: border-box; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        #status { font-size: 12px; margin-bottom: 10px; text-align: center; color: #aaa; }
        button { width: 140px; height: 40px; margin: 5px; cursor: pointer; z-index: 10; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">
        <h3 id="status">System Ready</h3>
        <button id="voiceBtn" onclick="safeSpeak()">Say Hello</button>
    </div>

<script>
    // --- 1. ERROR-PROOF WRAPPERS ---
    function runSafe(fn, ...args) {
        try { fn(...args); } catch (e) { console.error("Event Handler Error:", e); }
    }

    // --- 2. SDK EVENT LISTENERS ---
    window.addEventListener('scrollUp', () => runSafe(handleScrollUp));
    window.addEventListener('scrollDown', () => runSafe(handleScrollDown));
    window.addEventListener('sideClick', () => runSafe(handleSideClickEvent));
    window.addEventListener('longPressStart', () => runSafe(handleLongPressStart));
    window.addEventListener('longPressEnd', () => runSafe(handleLongPressEnd));

    // --- 3. HARDWARE LOGIC ---
    let lastClickTime = 0;
    const DOUBLE_CLICK_THRESHOLD = 300;
    let clickTimer = null;

    function handleSideClickEvent() {
        const now = Date.now();
        if (now - lastClickTime < DOUBLE_CLICK_THRESHOLD) {
            clearTimeout(clickTimer);
            handleDoubleClick();
            lastClickTime = 0;
        } else {
            lastClickTime = now;
            clickTimer = setTimeout(() => handleSingleClick(), DOUBLE_CLICK_THRESHOLD);
        }
        window.focus(); 
    }

    function handleSingleClick() {
        document.getElementById('status').innerText = "Single Click!";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleDoubleClick() {
        document.getElementById('status').innerText = "Double Click!";
        document.getElementById('app').style.borderColor = "red";
    }

    function handleScrollUp() {
        document.getElementById('status').innerText = "Scroll: DOWN"; 
        document.getElementById('app').style.borderColor = "yellow";
    }

    function handleScrollDown() {
        document.getElementById('status').innerText = "Scroll: UP";
        document.getElementById('app').style.borderColor = "green";
    }

    function handleLongPressStart() {
        document.getElementById('status').innerText = "Holding...";
    }

    function handleLongPressEnd() {
        document.getElementById('status').innerText = "Released";
        document.getElementById('app').style.borderColor = "#FE5000";
    }

    // --- 4. AUDIO BRIDGE ---
    function safeSpeak() {
        document.getElementById('status').innerText = "Talking...";
        if(window.PluginMessageHandler) {
            try {
                PluginMessageHandler.postMessage(JSON.stringify({
                    message: "Bridge is active.",
                    useLLM: true,
                    wantsR1Response: true 
                }));
            } catch(e) {
                document.getElementById('status').innerText = "Bridge Error";
            }
        }
        setTimeout(() => window.focus(), 100);
    }
</script>
</body>
</html>
