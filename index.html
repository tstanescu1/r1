<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, initial-scale=1.0">
    <style>
        body, html { width: 240px; height: 282px; margin: 0; padding: 0; background: #000; color: #fff; overflow: hidden; box-sizing: border-box; }
        #app { width: 240px; height: 282px; border: 5px solid #FE5000; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { width: 140px; height: 40px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <h3 id="status">System Ready</h3>
        <button id="voiceBtn" onclick="fastSpeak()">Say Hello (Fast)</button>
    </div>

<script>
    // --- 1. FAST TOUCH INPUTS ---
    let lastClickTime = 0;
    const DOUBLE_CLICK_THRESHOLD = 200; // Tighter window for speed
    let clickTimer = null;

    // Use touch events for instant response
    window.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'BUTTON') return;
    });

    window.addEventListener('touchend', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        const now = Date.now();
        if (now - lastClickTime < DOUBLE_CLICK_THRESHOLD) {
            clearTimeout(clickTimer);
            handleDoubleClick();
            lastClickTime = 0;
        } else {
            lastClickTime = now;
            clickTimer = setTimeout(() => handleSingleClick(), DOUBLE_CLICK_THRESHOLD);
        }
    });

    // --- 2. LOCAL TTS (INSTANT AUDIO) ---
    function fastSpeak() {
        document.getElementById('status').innerText = "Speaking (Local)...";
        
        // Try local Browser TTS first (Instant)
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance("Hello! This is instant.");
            window.speechSynthesis.speak(utterance);
        } else {
            // Fallback to Bridge if local TTS fails
            PluginMessageHandler.postMessage(JSON.stringify({
                message: "Hello",
                useLLM: true,
                wantsR1Response: true 
            }));
        }
        setTimeout(() => window.focus(), 100);
    }

    // --- 3. HARDWARE EVENT MAPPING ---
    window.addEventListener('scrollUp', () => { 
        document.getElementById('app').style.borderColor = "yellow";
        setTimeout(() => document.getElementById('app').style.borderColor = "#FE5000", 200);
    });

    // ... (Keep your existing handleSingleClick, handleDoubleClick functions here) ...

    function handleSingleClick() {
        document.getElementById('status').innerText = "Single Click!";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleDoubleClick() {
        document.getElementById('status').innerText = "Double Click!";
        document.getElementById('app').style.borderColor = "red";
    }
</script>
</body>
</html>
