<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, height=292, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body,html{width:240px;height:292px;background:#0d0d1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;-webkit-user-select:none;user-select:none}
#shell{width:240px;height:292px;position:relative;overflow:hidden}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}
.screen.active{display:flex}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}

/* Topbar */
.topbar{height:24px;min-height:24px;display:flex;align-items:center;padding:0 4px;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:10}
.bk{width:28px;height:20px;background:rgba(255,255,255,.1);border:none;border-radius:4px;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bk:active{background:rgba(255,80,0,.4)}
.ttl{flex:1;text-align:center;font-size:10px;font-weight:600;color:#ddd;letter-spacing:.3px}
.spacer{width:28px}

/* ═══ LAUNCHER ═══ */
#launcherScreen{background:linear-gradient(180deg,#0d0d1a,#111)}
.lhdr{display:flex;align-items:center;justify-content:center;padding:8px 10px 4px;position:relative}
.lhdr .bunny{font-size:22px}
.lhdr .name{font-size:12px;font-weight:700;color:#FE5000;margin-left:6px;letter-spacing:.8px}
.exit-btn{position:absolute;right:10px;top:8px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#666;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.exit-btn:active{background:rgba(255,80,0,.3);border-color:#FE5000;color:#FE5000}
.agrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:3px 8px;flex:1;align-content:start}
.atile{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;padding:6px 2px 4px;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;border:2px solid transparent}
.atile:active{transform:scale(.92);border-color:rgba(255,255,255,.3)}
.ti{font-size:22px;margin-bottom:1px}
.tn{font-size:8px;font-weight:600;color:#fff;text-align:center;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.lhint{text-align:center;padding:2px 0 4px;font-size:7px;color:#444}

/* ═══ CONFIRM DIALOG ═══ */
.confirm-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000;text-align:center;padding:20px}
.confirm-overlay.show{display:flex}
.conf-icon{font-size:32px;margin-bottom:6px}
.conf-msg{font-size:12px;color:#ccc;margin-bottom:14px;line-height:1.4}
.conf-btns{display:flex;gap:8px}
.conf-btn{padding:8px 20px;border-radius:16px;border:none;font-size:11px;font-weight:600;cursor:pointer}
.conf-btn.yes{background:#FE5000;color:#fff}
.conf-btn.no{background:rgba(255,255,255,.1);color:#aaa;border:1px solid #444}
.conf-btn:active{transform:scale(.95)}

/* ═══ MATH ═══ */
#app-math{background:#0d0d1a}
.mbody{flex:1;display:flex;flex-direction:column;padding:3px 8px}
.mhud{display:flex;justify-content:space-between;font-size:9px;color:#777;margin-bottom:1px}
.mhud .fire{color:#FE5000}
.meq-area{text-align:center;padding:4px 0 3px}
.meq{font-size:28px;font-weight:700}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 8px;align-content:center}
.mbtn{height:40px;border-radius:10px;border:2px solid #333;background:#111;color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.mbtn:active{transform:scale(.95)}
.mbtn.correct{border-color:#4CAF50;background:#0a2a0a;color:#4CAF50}
.mbtn.wrong{border-color:#f44336;background:#2a0a0a;color:#f44336}
.mbtn.reveal{border-color:#4CAF50;background:#0a2a0a;color:#4CAF50}
.mfb{text-align:center;font-size:15px;min-height:20px;padding-top:1px}
.mscore-bar{display:flex;justify-content:space-around;padding:2px 4px;background:rgba(255,255,255,.03);border-radius:6px;margin-top:2px}
.mscore-item{text-align:center}
.mscore-item .val{font-size:12px;font-weight:700;color:#FE5000}
.mscore-item .lab{font-size:7px;color:#555}
.levelup-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center}
.levelup-overlay.show{display:flex}
.lvl-emoji{font-size:46px;animation:bounce .6s ease infinite alternate}
.lvl-text{font-size:17px;font-weight:700;color:#FE5000;margin:4px 0}
.lvl-sub{font-size:10px;color:#aaa}
.lvl-btn{margin-top:10px;padding:8px 22px;background:#FE5000;border:none;border-radius:20px;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.lvl-btn:active{background:#e04500;transform:scale(.95)}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}

/* ═══ ANIMALS ═══ */
#app-animals{background:#0d1a0d}
.acard{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 10px;position:relative;touch-action:pan-x}
.acard .emoji{font-size:56px;margin-bottom:2px}
.acard .nm{font-size:16px;font-weight:700}
.acard .ft{font-size:10px;color:#aaa;margin-top:4px;line-height:1.4;max-height:50px;overflow:hidden}
.acard .arrows{position:absolute;top:50%;width:100%;display:flex;justify-content:space-between;padding:0 3px;transform:translateY(-50%);pointer-events:none}
.acard .arr{width:24px;height:40px;background:rgba(255,255,255,.08);border:none;border-radius:8px;color:#555;font-size:13px;display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;-webkit-tap-highlight-color:transparent}
.acard .arr:active{background:rgba(255,80,0,.3);color:#fff}
.abtn{margin-top:5px;padding:6px 20px;background:#FE5000;border:none;border-radius:18px;color:#fff;font-size:10px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.abtn:active{background:#e04500;transform:scale(.95)}

/* ═══ QUESTIONS ═══ */
#app-questions{background:#1a0d1a}
.qbody{flex:1;display:flex;flex-direction:column;padding:5px 7px}
.qcard{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:12px;padding:8px;text-align:center;touch-action:pan-x}
.qcard .qi{font-size:24px;margin-bottom:2px}
.qcard .qt{font-size:12px;font-weight:600;line-height:1.3;padding:0 4px}
.qcard .qa{font-size:10px;color:#bbb;margin-top:5px;line-height:1.4;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:0 4px;text-align:left;width:100%}
.qacts{display:flex;gap:5px;margin-top:4px;flex-shrink:0}
.qbtn{flex:1;height:30px;border-radius:10px;border:none;font-size:10px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:3px}
.qbtn:active{transform:scale(.95)}
.qbtn.ask{background:#FE5000;color:#fff}
.qbtn.nxt{background:rgba(255,255,255,.1);color:#aaa}

/* ═══ MAPS ═══ */
#app-maps{background:#0a0a0a}
.map-wrap{flex:1;position:relative;overflow:hidden}
#leafletMap{width:100%;height:100%;background:#1a1a2e}
.map-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85) 30%);padding:4px 6px 5px;z-index:500}
.map-chips{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:1px 0;touch-action:pan-x}
.map-chip{flex-shrink:0;padding:5px 9px;border-radius:12px;background:rgba(30,30,50,.95);color:#ccc;font-size:9px;font-weight:600;border:1.5px solid rgba(255,255,255,.12);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.map-chip:active,.map-chip.act{background:#FE5000;border-color:#FE5000;color:#fff}
.map-info{font-size:8px;color:#777;text-align:center;margin-top:2px}
.map-ctrls{position:absolute;top:28px;right:4px;display:flex;flex-direction:column;gap:3px;z-index:500}
.map-cbtn{width:26px;height:26px;background:rgba(15,15,30,.95);border:1.5px solid #555;border-radius:8px;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.map-cbtn:active{background:#FE5000;border-color:#FE5000}
.map-lyr{position:absolute;top:28px;left:4px;z-index:500;padding:4px 7px;border-radius:8px;background:rgba(15,15,30,.95);border:1.5px solid #555;color:#ccc;font-size:8px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.map-lyr:active{background:#FE5000;border-color:#FE5000}
.map-loc{position:absolute;top:58px;left:4px;z-index:500;padding:4px 7px;border-radius:8px;background:rgba(15,15,30,.95);border:1.5px solid #555;color:#ccc;font-size:8px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.map-loc:active{background:#FE5000;border-color:#FE5000}
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}

/* ═══ STORIES ═══ */
#app-stories{background:#1a0d0d}
.stbody{flex:1;padding:4px 6px;display:flex;flex-direction:column;overflow:hidden}
.st-tabs{display:flex;gap:4px;margin-bottom:3px;flex-shrink:0}
.st-tab{flex:1;padding:4px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid transparent;color:#888;font-size:9px;font-weight:600;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.st-tab.act{border-color:#FE5000;color:#FE5000;background:rgba(255,80,0,.1)}
.st-tab:active{transform:scale(.97)}
.st-scene{flex:1;display:flex;flex-direction:column;overflow:hidden}
.st-img{width:100%;height:88px;min-height:88px;border-radius:8px;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center;margin-bottom:3px;flex-shrink:0}
.st-img svg{width:100%;height:100%}
.st-text{flex:1;font-size:10px;color:#ccc;line-height:1.45;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:0 2px}
.st-acts{display:flex;gap:4px;margin-top:3px;flex-shrink:0}
.st-btn{flex:1;height:30px;border-radius:10px;border:none;font-size:9px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:2px;padding:0 4px}
.st-btn:active{transform:scale(.95)}
.st-btn.pri{background:#FE5000;color:#fff}
.st-btn.sec{background:rgba(255,255,255,.1);color:#aaa}
.st-pick{display:flex;gap:4px;margin-bottom:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;touch-action:pan-x;padding:1px 0}
.st-pc{flex-shrink:0;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid transparent;color:#aaa;font-size:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.st-pc.act{border-color:#FE5000;color:#FE5000;background:rgba(255,80,0,.1)}
.st-pc:active{transform:scale(.95)}

/* ═══ MYSTERY ═══ */
#app-mystery{background:#0a0d1a}
.mybod{flex:1;display:flex;flex-direction:column;padding:4px 6px;overflow:hidden}
.my-scene{width:100%;height:72px;min-height:72px;border-radius:8px;overflow:hidden;background:#111;margin-bottom:4px;flex-shrink:0}
.my-scene svg{width:100%;height:100%}
.my-clues{font-size:8px;color:#FE5000;margin-bottom:3px;padding:3px 4px;background:rgba(255,80,0,.08);border-radius:6px;flex-shrink:0}
.my-text{font-size:10px;color:#ccc;line-height:1.35;margin-bottom:5px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;max-height:60px;padding:0 2px}
.my-choices{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.my-choice{padding:8px 8px;border-radius:8px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:#ddd;font-size:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:left}
.my-choice:active{background:rgba(255,80,0,.2);border-color:#FE5000}
.my-end{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px}
.my-end .big{font-size:36px;margin-bottom:4px}
.my-end .msg{font-size:14px;font-weight:700;color:#FE5000;margin-bottom:3px}
.my-end .det{font-size:10px;color:#aaa;line-height:1.4;margin-bottom:4px}
.my-end .clue-list{font-size:8px;color:#FE5000;margin-bottom:6px}
.my-restart{padding:8px 20px;background:#FE5000;border:none;border-radius:16px;color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.my-restart:active{transform:scale(.95)}

/* ═══ AI OVERLAY ═══ */
#aiOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;text-align:center;padding:14px}
#aiOverlay.act{display:flex}
.ai-b{font-size:40px;margin-bottom:3px}
.ai-l{font-size:12px;font-weight:700;color:#FE5000;margin-bottom:2px}
.ai-s{font-size:10px;color:#777;margin-bottom:6px}
.ai-r{font-size:10px;color:#ddd;line-height:1.5;max-height:100px;overflow-y:auto;text-align:left;width:100%;padding:6px;background:rgba(255,255,255,.05);border-radius:8px}
.ai-x{margin-top:8px;padding:6px 26px;background:rgba(255,255,255,.1);border:1px solid #444;border-radius:18px;color:#aaa;font-size:9px;cursor:pointer}
.ai-x:active{background:rgba(255,80,0,.3);border-color:#FE5000}
</style>
</head>
<body>
<div id="shell">
<div id="content">

<!-- LAUNCHER -->
<div id="launcherScreen" class="screen active">
<div class="lhdr">
<span class="bunny">🐰</span><span class="name">BUNNY APPS</span>
<button class="exit-btn" onclick="confirmExit()" title="Exit">⏻</button>
</div>
<div class="agrid" id="appGrid"></div>
<div class="lhint">tap to open • hold side button → Bunny AI</div>
</div>

<!-- ANIMALS -->
<div id="app-animals" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">🦁 Animals</span><span class="spacer"></span></div>
<div class="acard" id="animalCard">
<div class="arrows"><button class="arr" onclick="animalNav(-1)">◀</button><button class="arr" onclick="animalNav(1)">▶</button></div>
<div class="emoji" id="aEmoji">🐘</div><div class="nm" id="aName">Elephant</div><div class="ft" id="aFact"></div>
<button class="abtn" onclick="animalAsk()">🔊 Tell me more!</button>
</div>
</div>

<!-- MATH -->
<div id="app-math" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">🔢 MathQuest</span><span class="spacer"></span></div>
<div class="mbody">
<div class="mhud"><span id="mLvl">Level 1</span><span id="mStreak" class="fire"></span></div>
<div class="meq-area"><div class="meq" id="mEq">3 + 4 = ?</div></div>
<div class="mgrid" id="mGrid"></div>
<div class="mfb" id="mFb"></div>
<div class="mscore-bar">
<div class="mscore-item"><div class="val" id="mScV">0</div><div class="lab">SCORE</div></div>
<div class="mscore-item"><div class="val" id="mBstV">0</div><div class="lab">BEST</div></div>
<div class="mscore-item"><div class="val" id="mCorV">0</div><div class="lab">RIGHT</div></div>
<div class="mscore-item"><div class="val" id="mTotV">0</div><div class="lab">TOTAL</div></div>
</div></div>
<div class="levelup-overlay" id="lvlUp">
<div class="lvl-emoji" id="lvlE">🎉</div><div class="lvl-text" id="lvlT">Level 2!</div><div class="lvl-sub" id="lvlS">Amazing!</div>
<button class="lvl-btn" onclick="dismissLvl()">Let's Go! →</button>
</div>
</div>

<!-- QUESTIONS -->
<div id="app-questions" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">❓ QuestionBox</span><span class="spacer"></span></div>
<div class="qbody">
<div class="qcard" id="qCard"><div class="qi">🤔</div><div class="qt" id="qText"></div><div class="qa" id="qAns"></div></div>
<div class="qacts"><button class="qbtn nxt" onclick="qNext()">⏭ Next</button><button class="qbtn ask" onclick="qAsk()">🔊 Ask!</button></div>
</div>
</div>

<!-- MAPS -->
<div id="app-maps" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">🗺️ Explorer</span><span class="spacer"></span></div>
<div class="map-wrap">
<div id="leafletMap"></div>
<div class="map-ctrls"><button class="map-cbtn" onclick="mapZ(1)">+</button><button class="map-cbtn" onclick="mapZ(-1)">−</button></div>
<button class="map-lyr" id="mapLyr" onclick="toggleLyr()">🛰️ Satellite</button>
<button class="map-loc" onclick="geoLocate()">📍 Find Me</button>
<div class="map-ov"><div class="map-chips" id="mapChips"></div><div class="map-info" id="mapInfo">Tap to explore!</div></div>
</div>
</div>

<!-- STORIES -->
<div id="app-stories" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">📖 Stories</span><span class="spacer"></span></div>
<div class="stbody">
<div class="st-tabs"><button class="st-tab act" id="tabRead" onclick="stTab('read')">📚 Read Aloud</button><button class="st-tab" id="tabAdv" onclick="stTab('adv')">🎮 Adventure</button></div>
<div id="stReadPanel" class="st-scene"></div>
<div id="stAdvPanel" class="st-scene" style="display:none"></div>
</div>
</div>

<!-- MYSTERY -->
<div id="app-mystery" class="screen">
<div class="topbar"><button class="bk" onclick="goHome()">◀</button><span class="ttl">🔍 Mystery</span><span class="spacer"></span></div>
<div class="mybod" id="myBody"></div>
</div>

</div>

<!-- CONFIRM EXIT -->
<div class="confirm-overlay" id="exitConf">
<div class="conf-icon">👋</div>
<div class="conf-msg">Exit Bunny Apps?</div>
<div class="conf-btns">
<button class="conf-btn no" onclick="cancelExit()">Stay</button>
<button class="conf-btn yes" onclick="doExit()">Exit</button>
</div>
</div>

<!-- AI OVERLAY -->
<div id="aiOverlay">
<div class="ai-b">🐰</div><div class="ai-l">Bunny AI</div><div class="ai-s" id="aiS">Listening...</div>
<div class="ai-r" id="aiR" style="display:none"></div>
<button class="ai-x" onclick="closeAI()">✕ Close</button>
</div>

</div>
<script>
// ═══════════════════════════════════════
//  BUNNY LAUNCHER v4 — Polished
// ═══════════════════════════════════════
const ST={activeApp:null,s:{}},SK='bunny_v4';
function $(id){return document.getElementById(id)}

// Storage
async function save(){try{const d=JSON.stringify({a:ST.activeApp,s:ST.s});window.creationStorage?await window.creationStorage.plain.setItem(SK,btoa(d)):localStorage.setItem(SK,d)}catch(e){}}
async function load(){try{let r;if(window.creationStorage){const s=await window.creationStorage.plain.getItem(SK);if(s)r=JSON.parse(atob(s))}else{const s=localStorage.getItem(SK);if(s)r=JSON.parse(s)}if(r){ST.activeApp=r.a||null;ST.s=r.s||{}}}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.hidden)save()});

// LLM
function askLLM(msg,voice=true){
    if(window.PluginMessageHandler)PluginMessageHandler.postMessage(JSON.stringify({message:msg,useLLM:true,wantsR1Response:voice}));
    else setTimeout(()=>window.onPluginMessage&&window.onPluginMessage({message:'[Mock] '+msg.substring(0,80),data:null}),600);
}
let llmCB=null,aiOn=false;
window.onPluginMessage=function(d){const m=d.data||d.message||'';if(aiOn){$('aiR').textContent=m.substring(0,300);$('aiR').style.display='';$('aiS').textContent='Bunny says:';return}if(llmCB){llmCB(m);llmCB=null}};

// Screens
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id)?.classList.add('active')}
function goHome(){ST.activeApp=null;showScr('launcherScreen');save()}

// Exit
function confirmExit(){$('exitConf').classList.add('show')}
function cancelExit(){$('exitConf').classList.remove('show')}
function doExit(){if(window.closeWebView)closeWebView.postMessage('');else window.close&&window.close()}

// AI Overlay
function openAI(){aiOn=true;$('aiOverlay').classList.add('act');$('aiS').textContent='Listening...';$('aiR').style.display='none';askLLM("You are Bunny AI, a sweet cartoon rabbit friend for kids. Say hi warmly, ask what they want to know. 2 short fun sentences.",true)}
function closeAI(){aiOn=false;$('aiOverlay').classList.remove('act')}

// HW

let mSc=0,mSt=0,mLv=1,mBs=0,mCo=0,mTo=0,mP=null,mDn=false;
const lvlMsg=[{e:'🌟',t:'Level 2!',s:'Addition pro! Bigger numbers!'},{e:'🚀',t:'Level 3!',s:'Subtraction time!'},{e:'🔥',t:'Level 4!',s:'+ and − mixed up!'},{e:'⚡',t:'Level 5!',s:'Multiplication! You\'re a star!'},{e:'👑',t:'Level 6!',s:'Math champion!'}];
function mGen(){
    mDn=false;let a,b,op,ans;
    if(mLv<=2){a=Math.floor(Math.random()*(mLv*5))+1;b=Math.floor(Math.random()*(mLv*5))+1;op='+';ans=a+b}
    else if(mLv<=4){a=Math.floor(Math.random()*12)+2;b=Math.floor(Math.random()*Math.min(a,10))+1;op=Math.random()>.5?'+':'−';ans=op==='+'?a+b:a-b}
    else{a=Math.floor(Math.random()*10)+1;b=Math.floor(Math.random()*10)+1;op='×';ans=a*b}
    const opts=new Set([ans]);while(opts.size<4){const w=ans+(Math.floor(Math.random()*10)-5||1);if(w>=0)opts.add(w)}
    mP={a,b,op,ans,opts:[...opts].sort((x,y)=>x-y)};mRn()
}
function mRn(){const p=mP;$('mEq').textContent=`${p.a} ${p.op} ${p.b} = ?`;$('mLvl').textContent=`Level ${mLv}`;$('mStreak').textContent=mSt>0?'🔥'.repeat(Math.min(mSt,5)):'';$('mGrid').innerHTML=p.opts.map((o,i)=>`<button class="mbtn" id="mb${i}" onclick="mPk(${i})">${o}</button>`).join('');$('mFb').textContent='';$('mScV').textContent=mSc;$('mBstV').textContent=mBs;$('mCorV').textContent=mCo;$('mTotV').textContent=mTo}
function mPk(i){
    if(mDn){mGen();return}mDn=true;mTo++;const p=mP,ok=p.opts[i]===p.ans;
    if(ok){mSc+=mLv*10;mSt++;mCo++;if(mSc>mBs)mBs=mSc;$('mb'+i).classList.add('correct');$('mFb').textContent='🎉 Correct!';if(mSt>0&&mSt%5===0&&mLv<6){mLv++;showLvl(mLv)}}
    else{mSt=0;$('mb'+i).classList.add('wrong');mP.opts.forEach((o,j)=>{if(o===mP.ans)$('mb'+j).classList.add('reveal')});$('mFb').textContent=`❌ It's ${mP.ans}`}
    $('mScV').textContent=mSc;$('mBstV').textContent=mBs;$('mCorV').textContent=mCo;$('mTotV').textContent=mTo;$('mStreak').textContent=mSt>0?'🔥'.repeat(Math.min(mSt,5)):'';
    ST.s.math={sc:mSc,st:mSt,lv:mLv,bs:mBs,co:mCo,to:mTo};save()
}
function showLvl(lv){const m=lvlMsg[Math.min(lv-2,lvlMsg.length-1)];$('lvlE').textContent=m.e;$('lvlT').textContent=m.t;$('lvlS').textContent=m.s;$('lvlUp').classList.add('show')}
function dismissLvl(){$('lvlUp').classList.remove('show');mGen()}

function initMap(){
    if(leafMap){leafMap.invalidateSize();return}
    const center=userLoc||DEFAULT_LOC;
    leafMap=L.map('leafletMap',{center,zoom:13,zoomControl:false,attributionControl:false});
    tileL=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafMap);
    satL=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18});
    L.circleMarker(center,{radius:6,color:'#FE5000',fillColor:'#FE5000',fillOpacity:.8}).addTo(leafMap).bindPopup('📍 You are here');
    renderChips();mapLoad('parks');
    // Try geolocation
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
            userLoc=[pos.coords.latitude,pos.coords.longitude];
            leafMap.setView(userLoc,14);
            L.circleMarker(userLoc,{radius:7,color:'#4CAF50',fillColor:'#4CAF50',fillOpacity:.9}).addTo(leafMap).bindPopup('📍 You!');
            $('mapInfo').textContent='Location found!';
        },()=>{$('mapInfo').textContent='Using default location'},{enableHighAccuracy:true,timeout:8000});
    }
}
function renderChips(){$('mapChips').innerHTML=mapCats.map(c=>`<span class="map-chip${c.k===aCat?' act':''}" data-k="${c.k}" onclick="mapCat(this)">${c.l}</span>`).join('')}
function mapCat(el){aCat=el.dataset.k;renderChips();mapLoad(aCat)}
function mapLoad(cat){
    mapMk.forEach(m=>leafMap.removeLayer(m));mapMk=[];
    (POI[cat]||[]).forEach(p=>{const m=L.marker([p.lt,p.ln],{icon:L.divIcon({className:'',html:`<div style="background:#FE5000;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)">📍</div>`,iconSize:[20,20],iconAnchor:[10,10]})}).addTo(leafMap);m.bindPopup(`<b style="font-size:10px">${p.n}</b><br><span style="font-size:9px;color:#666">${p.d}</span>`);mapMk.push(m)});
    if(mapMk.length)leafMap.fitBounds(L.featureGroup(mapMk).getBounds().pad(.2));
    $('mapInfo').textContent=`${mapMk.length} places`;
}
function mapZ(d){leafMap&&(d>0?leafMap.zoomIn():leafMap.zoomOut())}
function toggleLyr(){if(mapSat){leafMap.removeLayer(satL);leafMap.addLayer(tileL);$('mapLyr').textContent='🛰️ Satellite';mapSat=false}else{leafMap.removeLayer(tileL);leafMap.addLayer(satL);$('mapLyr').textContent='🗺️ Street';mapSat=true}}
function geoLocate(){
    if(!navigator.geolocation){$('mapInfo').textContent='No GPS available';return}
    $('mapInfo').textContent='Finding you...';
    navigator.geolocation.getCurrentPosition(pos=>{userLoc=[pos.coords.latitude,pos.coords.longitude];leafMap.setView(userLoc,15);$('mapInfo').textContent='Found you!'},()=>{$('mapInfo').textContent='Location unavailable'},{enableHighAccuracy:true,timeout:8000})
}

let stMode='read',stReadIdx=0,stReadPage=0,stAdvIdx=0,stAdvScene=0;

function stTab(mode){
    stMode=mode;
    $('tabRead').classList.toggle('act',mode==='read');$('tabAdv').classList.toggle('act',mode==='adv');
    $('stReadPanel').style.display=mode==='read'?'':'none';
    $('stAdvPanel').style.display=mode==='adv'?'':'none';
    mode==='read'?renderRead():renderAdv();
}
// READ ALOUD
function renderRead(){
    const p=$('stReadPanel');const stories=READ_STORIES;
    const s=stories[stReadIdx];const pg=s.pages[stReadPage];
    p.innerHTML=`<div class="st-pick">${stories.map((st,i)=>`<span class="st-pc${i===stReadIdx?' act':''}" onclick="pickRead(${i})">${st.icon} ${st.title}</span>`).join('')}</div>
    <div class="st-img">${svgImg(pg.img)}</div>
    <div class="st-text">${pg.text}</div>
    <div class="st-acts">
    ${stReadPage>0?'<button class="st-btn sec" onclick="readNav(-1)">◀ Back</button>':''}
    <button class="st-btn pri" onclick="readAloud()">🔊 Read</button>
    ${stReadPage<s.pages.length-1?'<button class="st-btn sec" onclick="readNav(1)">Next ▶</button>':'<button class="st-btn sec" onclick="readNav(0)">🔄 Start</button>'}
    </div>`;
}
function pickRead(i){stReadIdx=i;stReadPage=0;renderRead()}
function readNav(d){if(d===0)stReadPage=0;else stReadPage=Math.max(0,Math.min(READ_STORIES[stReadIdx].pages.length-1,stReadPage+d));renderRead()}
function readAloud(){const pg=READ_STORIES[stReadIdx].pages[stReadPage];askLLM(`Read this aloud warmly for a child at bedtime. Just read the text exactly, in a gentle voice: "${pg.text}"`,true)}

// ADVENTURES
function renderAdv(){
    const p=$('stAdvPanel');const stories=ADV_STORIES;
    const s=stories[stAdvIdx];const sc=s.scenes[stAdvScene];
    p.innerHTML=`<div class="st-pick">${stories.map((st,i)=>`<span class="st-pc${i===stAdvIdx?' act':''}" onclick="pickAdv(${i})">${st.icon} ${st.title}</span>`).join('')}</div>
    <div class="st-img">${svgImg(sc.img)}</div>
    <div class="st-text">${sc.text}</div>
    <div class="st-acts">${sc.acts.map(a=>`<button class="st-btn ${a===sc.acts[0]?'pri':'sec'}" onclick="advChoice(${a.n})">${a.l}</button>`).join('')}</div>`;
}
function pickAdv(i){stAdvIdx=i;stAdvScene=0;renderAdv()}
function advChoice(n){if(n===-1)stAdvScene=0;else stAdvScene=n;renderAdv()}
appInit.stories=()=>{stMode='read';stReadPage=0;stTab('read')};

{img:'garden_clue',text:'Chocolate pawprints by a hole in the fence! A blue feather in a bush. The neighbor\'s cat is sleeping nearby, looking innocent...',clue:'🐾 Pawprints',ch:[{l:'🐾 Follow pawprints',n:4},{l:'🔙 Go back',n:0}]},
{img:'living',text:'Crumbs lead to the couch. Under the cushion: an empty plate! A sticky note says "I.O.U - sorry!" in messy handwriting.',clue:'📝 IOU note',ch:[{l:'🚪 Check whose writing',n:5},{l:'🔙 Go back',n:0}]},
{img:'garage',text:'A jar of crumbs on the workbench. A walkie-talkie is ON — you hear someone giggling on the other end!',clue:'📻 Walkie-talkie',ch:[{l:'🎤 Talk into it',n:6},{l:'🔙 Go back',n:0}]},
{img:'fence',text:'Pawprints lead to raccoons having their OWN cookie party! But these are different cookies. Grandma\'s aren\'t here — the raccoons are innocent!',clue:'🦝 Raccoons innocent',ch:[{l:'🔙 Keep looking',n:0}]},
{img:'bedroom',text:'Your sister\'s room — chocolate on her homework. She says: "I took ONE before they vanished! Check Tommy\'s treehouse!"',clue:'🍫 Sister took one',ch:[{l:'🌳 Treehouse!',n:7},{l:'🔙 Go back',n:0}]},

{img:'party',text:null,end:true},

const MySVG={kitchen:'<rect width="220" height="72" fill="#2a1a0a"/><rect x="10" y="30" width="70" height="36" fill="#4a3020" rx="3"/><circle cx="40" cy="38" r="5" fill="#cc8844"/><circle cx="55" cy="40" r="4" fill="#cc8844"/><rect x="130" y="25" width="60" height="41" fill="#3a2a1a" rx="3"/><circle cx="140" cy="58" r="2" fill="#cc8844"/><circle cx="155" cy="60" r="1.5" fill="#cc8844"/>',garden_clue:'<rect width="220" height="72" fill="#1a3a1a"/><rect x="0" y="50" width="220" height="22" fill="#2a4a2a"/><circle cx="150" cy="54" r="3" fill="#6B3A1F"/><circle cx="135" cy="56" r="2.5" fill="#6B3A1F"/><circle cx="120" cy="55" r="2" fill="#6B3A1F"/>',living:'<rect width="220" height="72" fill="#2a2020"/><rect x="30" y="25" width="160" height="38" fill="#4a3030" rx="4"/><rect x="40" y="30" width="140" height="12" fill="#5a4040" rx="2"/><rect x="90" y="43" width="30" height="4" fill="#fff" opacity=".3"/>',garage:'<rect width="220" height="72" fill="#1a1a1a"/><rect x="20" y="22" width="70" height="32" fill="#333" rx="2"/><circle cx="160" cy="38" r="10" fill="#444"/><circle cx="160" cy="38" r="3" fill="#ff4444" opacity=".6"><animate attributeName="opacity" values=".6;1;.6" dur="1s" repeatCount="indefinite"/></circle>',fence:'<rect width="220" height="72" fill="#1a2a1a"/><rect x="0" y="40" width="220" height="32" fill="#2a3a2a"/><line x1="0" y1="32" x2="220" y2="32" stroke="#8B6914" stroke-width="3"/><circle cx="130" cy="48" r="8" fill="#888"/><circle cx="145" cy="46" r="6" fill="#777"/>',bedroom:'<rect width="220" height="72" fill="#2a1a2a"/><rect x="40" y="22" width="70" height="38" fill="#4a3050" rx="3"/><rect x="130" y="30" width="45" height="28" fill="#3a2040" rx="2"/>',walkie:'<rect width="220" height="72" fill="#1a1a2a"/><rect x="80" y="12" width="55" height="46" fill="#444" rx="4"/><rect x="90" y="22" width="35" height="16" fill="#222" rx="2"/><circle cx="107" cy="48" r="5" fill="#ff4444" opacity=".7"><animate attributeName="opacity" values=".7;1;.7" dur=".5s" repeatCount="indefinite"/></circle>',treehouse:'<rect width="220" height="72" fill="#0a2a0a"/><rect x="95" y="5" width="25" height="52" fill="#8B6914"/><rect x="62" y="5" width="90" height="32" fill="#6B5410" rx="3"/><polygon points="62,5 107,-10 152,5" fill="#5a4a0a"/><rect x="88" y="22" width="18" height="15" fill="#4a3a0a" rx="2"/>',party:'<rect width="220" height="72" fill="#2a2a0a"/><rect x="50" y="38" width="120" height="24" fill="#5a4a2a" rx="3"/><circle cx="80" cy="42" r="5" fill="#cc8844"/><circle cx="100" cy="40" r="4" fill="#cc8844"/><circle cx="120" cy="43" r="5" fill="#cc8844"/><text x="110" y="24" text-anchor="middle" fill="#ffe066" font-size="12" font-weight="700">🎉 SOLVED!</text>'};
function mySvg(k){return `<svg viewBox="0 0 220 72" xmlns="http://www.w3.org/2000/svg">${MySVG[k]||MySVG.kitchen}</svg>`}

let myS=0,myC=[];
function renderMy(){
    const s=MY.sc[myS];
    if(s.end){$('myBody').innerHTML=`<div class="my-scene">${mySvg('party')}</div><div class="my-end"><div class="big">🕵️</div><div class="msg">Case Closed!</div><div class="det">Tommy took the cookies for a tea party with friends!</div><div class="clue-list">Clues: ${myC.join(' ')}</div><button class="my-restart" onclick="myReset()">🔄 New Case!</button></div>`;return}
    if(s.clue&&!myC.includes(s.clue))myC.push(s.clue);
    let clH=myC.length?`<div class="my-clues">🔍 ${myC.join(' ')}</div>`:'';
    $('myBody').innerHTML=`<div class="my-scene">${mySvg(s.img)}</div>${clH}<div class="my-text">${s.text}</div><div class="my-choices">${s.ch.map(c=>`<div class="my-choice" onclick="myPick(${c.n})">${c.l}</div>`).join('')}</div>`;
}
function myPick(n){myS=n;renderMy()}
function myReset(){myS=0;myC=[];renderMy()}
appInit.mystery=()=>{myS=0;myC=[];renderMy()};

window.addEventListener('load',async()=>{await load();renderLauncher();if(ST.activeApp&&appInit[ST.activeApp])launch(ST.activeApp)});
