<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, initial-scale=1.0">
    <style>
        body, html { 
            width: 240px; height: 282px; 
            margin: 0; padding: 0; 
            background: #000; color: #fff; 
            overflow: hidden; font-family: sans-serif;
            box-sizing: border-box;
        }
        #app { 
            width: 240px; height: 282px; 
            border: 5px solid #FE5000; 
            box-sizing: border-box; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        button { 
            width: 120px; height: 40px; 
            margin: 10px; cursor: pointer; 
            z-index: 10; 
        }
        #status { font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <h3 id="status">Ready</h3>
        <button id="voiceBtn" onclick="speakTest()">Say Hello</button>
    </div>

<script>
    // --- 1. HARDWARE BUTTON LOGIC ---
    let clickCount = 0;
    let pressTimer = null;
    let startTime = 0;

    // Use window-level listeners to catch physical interaction
    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return; // Ignore on-screen UI taps
        startTime = Date.now();
        pressTimer = setTimeout(() => handleLongPress(), 800);
    });

    window.addEventListener('mouseup', (e) => {
        if (e.target.tagName === 'BUTTON') return; // Ignore on-screen UI taps
        clearTimeout(pressTimer);
        let duration = Date.now() - startTime;

        if (duration < 500) { 
            clickCount++;
            setTimeout(() => {
                if (clickCount === 1) handleSingleClick();
                else if (clickCount === 2) handleDoubleClick();
                clickCount = 0;
            }, 300);
        }
    });

    // --- 2. HARDWARE ACTIONS ---
    function handleSingleClick() {
        document.getElementById('status').innerText = "Single Click!";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleDoubleClick() {
        document.getElementById('status').innerText = "Double Click!";
        document.getElementById('app').style.borderColor = "red";
    }

    function handleLongPress() {
        document.getElementById('status').innerText = "Long Press!";
        document.getElementById('app').style.borderColor = "green";
    }

    // --- 3. SCROLL WHEEL (Native Browser Listener) ---
    window.addEventListener('wheel', (e) => {
        document.getElementById('status').innerText = "Scrolling: " + (e.deltaY > 0 ? "Down" : "Up");
        document.getElementById('app').style.borderColor = "#FFD700"; // Gold on scroll
    }, { passive: false });

    // --- 4. R1 SDK BRIDGE ---
    function speakTest() {
        document.getElementById('status').innerText = "Speaking...";
        if(window.PluginMessageHandler) {
            PluginMessageHandler.postMessage(JSON.stringify({
                message: "Hello! The audio bridge is working.",
                useLLM: true,
                wantsR1Response: true 
            }));
        } else {
            document.getElementById('status').innerText = "Bridge not found";
        }
    }

    window.onPluginMessage = function(data) {
        console.log("R1 Message:", data);
    };
</script>
</body>
</html>
