<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html { width: 240px; height: 282px; margin: 0; background: #000; color: #fff; overflow: hidden; }
        #app { width: 240px; height: 282px; border: 5px solid #FE5000; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="app">
    <h3 id="status">Ready</h3>
    <button onclick="speakTest()">Test Voice</button>
</div>

<script>
    // --- BUTTON LOGIC (Manual Debounce) ---
    let clickCount = 0;
    let pressTimer = null;
    let startTime = 0;

    // Use 'mousedown'/'mouseup' to track hardware button state
    // Note: If 'sideClick' isn't firing, attach these to 'window'
    window.addEventListener('mousedown', () => {
        startTime = Date.now();
        pressTimer = setTimeout(() => {
            handleLongPress();
        }, 800); // 800ms hold = Long Press
    });

    window.addEventListener('mouseup', () => {
        clearTimeout(pressTimer);
        let duration = Date.now() - startTime;

        if (duration < 500) { // It's a click
            clickCount++;
            setTimeout(() => {
                if (clickCount === 1) handleSingleClick();
                else if (clickCount === 2) handleDoubleClick();
                clickCount = 0;
            }, 300); // Wait 300ms to see if another click comes
        }
    });

    function handleSingleClick() {
        document.getElementById('status').innerText = "Single Click!";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleDoubleClick() {
        document.getElementById('status').innerText = "Double Click!";
        document.getElementById('app').style.borderColor = "red";
    }

    function handleLongPress() {
        document.getElementById('status').innerText = "Long Press!";
        document.getElementById('app').style.borderColor = "green";
    }

    // --- AUDIO FIX ---
    function speakTest() {
        document.getElementById('status').innerText = "Speaking...";
        PluginMessageHandler.postMessage(JSON.stringify({
            message: "Hello! If you can hear this, the audio bridge is working.",
            useLLM: true,
            wantsR1Response: true 
        }));
    }

    // Listen for bridge messages
    window.onPluginMessage = function(data) {
        console.log("Bridge Received:", data);
        // Sometimes the SDK needs a specific acknowledgement
    };
</script>
</body>
</html>
