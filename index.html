<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, initial-scale=1.0">
    <style>
        body, html { width: 240px; height: 282px; margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; box-sizing: border-box; }
        #app { width: 240px; height: 282px; border: 5px solid #FE5000; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status { font-size: 14px; margin-bottom: 10px; text-align: center; }
        button { width: 120px; height: 40px; margin: 10px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <div id="app">
        <h3 id="status">Ready</h3>
        <button id="voiceBtn" onclick="speakTest()">Say Hello</button>
    </div>

<script>
    // --- 1. SDK EVENT LISTENERS ---
    window.addEventListener('scrollUp', handleScrollUp);
    window.addEventListener('scrollDown', handleScrollDown);
    window.addEventListener('sideClick', handleSideClickEvent); // We bridge this to our custom logic
    window.addEventListener('longPressStart', handleLongPressStart);
    window.addEventListener('longPressEnd', handleLongPressEnd);

    // --- 2. DEBOUNCE LOGIC FOR DOUBLE CLICK ---
    let lastClickTime = 0;
    const DOUBLE_CLICK_THRESHOLD = 300; // ms
    let clickTimer = null;

    function handleSideClickEvent() {
        const now = Date.now();
        // If the gap between this click and the last is small, it's a double click
        if (now - lastClickTime < DOUBLE_CLICK_THRESHOLD) {
            clearTimeout(clickTimer); // Cancel the pending single click
            handleDoubleClick();
            lastClickTime = 0; // Reset
        } else {
            // Otherwise, it's a potential single click
            lastClickTime = now;
            clickTimer = setTimeout(() => {
                handleSingleClick();
            }, DOUBLE_CLICK_THRESHOLD);
        }
    }

    // --- 3. HARDWARE ACTIONS ---
    function handleSingleClick() {
        document.getElementById('status').innerText = "Single Click!";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleDoubleClick() {
        document.getElementById('status').innerText = "Double Click!";
        document.getElementById('app').style.borderColor = "red";
    }

    function handleScrollUp() {
        document.getElementById('status').innerText = "Scroll: UP";
        document.getElementById('app').style.borderColor = "green";
    }

    function handleScrollDown() {
        document.getElementById('status').innerText = "Scroll: DOWN";
        document.getElementById('app').style.borderColor = "yellow";
    }

    function handleLongPressStart() {
        document.getElementById('status').innerText = "Holding...";
    }

    function handleLongPressEnd() {
        document.getElementById('status').innerText = "Released";
        document.getElementById('app').style.borderColor = "#FE5000";
    }

    // --- 4. AUDIO BRIDGE ---
    function speakTest() {
        if(window.PluginMessageHandler) {
            PluginMessageHandler.postMessage(JSON.stringify({
                message: "Bridge active.",
                useLLM: true,
                wantsR1Response: true 
            }));
        }
    }
</script>
</body>
</html>
