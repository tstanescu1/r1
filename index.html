<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, initial-scale=1.0">
    <style>
        body, html { 
            width: 240px; height: 282px; margin: 0; padding: 0; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden; box-sizing: border-box;
        }
        #app { 
            width: 240px; height: 282px; border: 5px solid #FE5000; 
            box-sizing: border-box; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        #status { font-size: 14px; margin-bottom: 10px; text-align: center; }
        button { width: 120px; height: 40px; margin: 10px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <div id="app">
        <h3 id="status">Ready</h3>
        <button id="voiceBtn" onclick="speakTest()">Say Hello</button>
    </div>

<script>
    // --- 1. SDK EVENT LISTENERS (From your Implementation Plan) ---
    window.addEventListener('scrollUp', handleScrollUp);
    window.addEventListener('scrollDown', handleScrollDown);
    window.addEventListener('sideClick', handleClick);
    window.addEventListener('longPressStart', handleLongPressStart);
    window.addEventListener('longPressEnd', handleLongPressEnd);

    // --- 2. HARDWARE EVENT HANDLERS ---
    function handleScrollUp() {
        document.getElementById('status').innerText = "Scroll: UP";
        document.getElementById('app').style.borderColor = "green"; // Visual feedback
    }

    function handleScrollDown() {
        document.getElementById('status').innerText = "Scroll: DOWN";
        document.getElementById('app').style.borderColor = "blue";
    }

    function handleClick() {
        document.getElementById('status').innerText = "Side Button: Click";
        document.getElementById('app').style.borderColor = "red";
    }

    function handleLongPressStart() {
        document.getElementById('status').innerText = "Side Button: Holding...";
    }

    function handleLongPressEnd() {
        document.getElementById('status').innerText = "Side Button: Released";
        document.getElementById('app').style.borderColor = "#FE5000"; // Back to default
    }

    // --- 3. AUDIO BRIDGE ---
    function speakTest() {
        document.getElementById('status').innerText = "Speaking...";
        if(window.PluginMessageHandler) {
            PluginMessageHandler.postMessage(JSON.stringify({
                message: "Hello! The audio bridge is working.",
                useLLM: true,
                wantsR1Response: true 
            }));
        } else {
            document.getElementById('status').innerText = "Bridge not found";
        }
    }

    // Handle incoming SDK responses
    window.onPluginMessage = function(data) {
        console.log("R1 Message:", data);
    };
</script>
</body>
</html>
